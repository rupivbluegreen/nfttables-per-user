# Members of AD group "dbadmins" may tunnel to database subnets.
# match: the exact group name as `getent group <name>` resolves it on this
#        host (SSSD settings like use_fully_qualified_names affect this).
# allow: proto/dest:port where dest is an IPv4 address or CIDR and port is
#        a single port or range N-M. Multiple allow lines (or space-separated
#        specs on one line) accumulate.
match=dbadmins
allow=tcp/10.1.2.0/24:5432
allow=tcp/10.9.0.10:22
