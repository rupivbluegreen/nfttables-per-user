# tunnelfw global configuration
#
# resolvers: IPv4 DNS servers that managed users may query (port 53).
# Needed because ssh -L/-D destination hostnames are resolved on the bastion
# by the user's own sshd process. Default: nameservers from /etc/resolv.conf.
#resolvers=10.0.0.2 10.0.0.3

# scope_groups: groups whose members are always managed (default-deny egress)
# even if no policy in groups.d grants them anything. Typically the umbrella
# "may log in to the tunnel daemon at all" group, matching AllowGroups in
# sshd_tunnel_config.
scope_groups=tunnel-users
